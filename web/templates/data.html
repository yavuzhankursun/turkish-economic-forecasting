<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veri - TÜBİTAK Tahmin Sistemi</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container-fluid">
            <a class="navbar-brand" href="/"><i class="bi bi-graph-up-arrow"></i> TÜBİTAK Tahmin Sistemi</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="/">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="/data">Veri</a></li>
                    <li class="nav-item"><a class="nav-link" href="/multi">Çok Göstergeli</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container-fluid mt-4">
        <h2><i class="bi bi-table"></i> Ekonomik Veri Görüntüleme</h2>
        <hr>
        
        <div class="row">
            <div class="col-12">
                <div class="card">
                    <div class="card-header d-flex justify-content-between">
                        <h6 class="mb-0">USD/TRY Tarihsel Verileri</h6>
                        <button class="btn btn-sm btn-primary" onclick="loadData()">
                            <i class="bi bi-arrow-clockwise"></i> Yenile
                        </button>
                    </div>
                    <div class="card-body">
                        <div class="table-responsive" style="max-height: 600px; overflow-y: auto;">
                            <table class="table table-striped table-hover" id="dataTable">
                                <thead>
                                    <tr>
                                        <th>#</th>
                                        <th>Tarih</th>
                                        <th>USD/TRY</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr>
                                        <td colspan="3" class="text-center">
                                            <div class="spinner-border text-primary" role="status">
                                                <span class="visually-hidden">Yükleniyor...</span>
                                            </div>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/api.js') }}"></script>
    <script>
        document.addEventListener('DOMContentLoaded', loadData);
        
        async function loadData() {
            try {
                const result = await getLatestData();
                if (result.success) {
                    const tbody = document.querySelector('#dataTable tbody');
                    tbody.innerHTML = result.data.records.reverse().map((record, idx) => `
                        <tr>
                            <td>${idx + 1}</td>
                            <td>${record.date}</td>
                            <td><strong>${record.value.toFixed(4)} TRY</strong></td>
                        </tr>
                    `).join('');
                }
            } catch (error) {
                const tbody = document.querySelector('#dataTable tbody');
                tbody.innerHTML = '<tr><td colspan="3" class="text-center text-danger">Veri yüklenemedi</td></tr>';
            }
        }
    </script>
</body>
</html>
